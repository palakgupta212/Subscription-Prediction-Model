<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Prediction AI</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Loan Prediction AI</h1>
            <p>Enter applicant details to instantly predict loan approval likelihood using our advanced Random Forest
                model.</p>
        </header>

        <main>
            <div class="card form-card">
                <form id="prediction-form">
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="Gender">Gender</label>
                            <select id="Gender" name="Gender" required>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="Married">Married</label>
                            <select id="Married" name="Married" required>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="Dependents">Dependents</label>
                            <select id="Dependents" name="Dependents" required>
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3+">3+</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="Education">Education</label>
                            <select id="Education" name="Education" required>
                                <option value="Graduate">Graduate</option>
                                <option value="Not Graduate">Not Graduate</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="Self_Employed">Self Employed</label>
                            <select id="Self_Employed" name="Self_Employed" required>
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="ApplicantIncome">Applicant Income ($)</label>
                            <input type="number" id="ApplicantIncome" name="ApplicantIncome" value="5000" min="0"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="CoapplicantIncome">Coapplicant Income ($)</label>
                            <input type="number" id="CoapplicantIncome" name="CoapplicantIncome" value="0" min="0"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="LoanAmount">Loan Amount ($k)</label>
                            <input type="number" id="LoanAmount" name="LoanAmount" value="150" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="Loan_Amount_Term">Loan Amount Term (Days)</label>
                            <input type="number" id="Loan_Amount_Term" name="Loan_Amount_Term" value="360" min="1"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="Credit_History">Credit History</label>
                            <select id="Credit_History" name="Credit_History" required>
                                <option value="1.0">Good (1.0)</option>
                                <option value="0.0">Bad (0.0)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="Property_Area">Property Area</label>
                            <select id="Property_Area" name="Property_Area" required>
                                <option value="Urban">Urban</option>
                                <option value="Semiurban">Semiurban</option>
                                <option value="Rural">Rural</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span class="btn-text">Generate Prediction</span>
                        <div class="spinner hidden" id="spinner"></div>
                    </button>
                </form>
            </div>

            <div class="card result-card hidden" id="result-card">
                <h2>Prediction Result</h2>

                <div class="result-circle" id="result-circle">
                    <span id="prediction-text">...</span>
                </div>

                <div class="confidence-box">
                    <p>Model Confidence: <span id="confidence-text">0</span>%</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>

                <button class="reset-btn" id="reset-btn">New Prediction</button>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
